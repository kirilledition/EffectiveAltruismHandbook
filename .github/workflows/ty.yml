name: Type Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ty-check:
    name: Run ty check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ty check
        run: uv tool run ty check --python .venv
