name: Build and Release EA Handbook

on:
  push:
    branches:
      - main
  schedule:
    # Rebuild weekly on Sundays at 00:00 UTC so the ebook stays up-to-date
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest --cov=ea_handbook --cov-report=xml

      - name: Generate coverage badge
        run: uv run genbadge coverage -i coverage.xml

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add coverage-badge.svg
          git commit -m "Update coverage badge" || echo "No changes to commit"
          git push


  build:
    name: Build ebook
    runs-on: ubuntu-latest
    needs: test
    outputs:
      content_changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Install pandoc and weasyprint
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends pandoc weasyprint

      - name: Build ebook (markdown + epub + pdf)
        run: uv run ea-handbook build --output-dir dist --verbose

      - name: Compute content hash
        id: hash
        run: echo "sha256=$(sha256sum dist/ea-handbook.md | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Restore previous content hash
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: .content-hash
          key: ea-handbook-content-hash
          restore-keys: ea-handbook-content-hash

      - name: Check for content changes
        id: diff
        run: |
          if [ -f .content-hash ] && [ "$(cat .content-hash)" = "${{ steps.hash.outputs.sha256 }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Save new content hash
        if: steps.diff.outputs.changed == 'true'
        run: echo "${{ steps.hash.outputs.sha256 }}" > .content-hash

      - name: Update content hash cache
        if: steps.diff.outputs.changed == 'true'
        uses: actions/cache/save@v4
        with:
          path: .content-hash
          key: ea-handbook-content-hash-${{ steps.hash.outputs.sha256 }}

      - name: Upload build artifacts
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ea-handbook-ebook
          path: dist/
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    # Only create a release on the default branch (not for PRs or forks)
    if: github.ref == 'refs/heads/main' && github.repository == 'kirilledition/EffectiveAltruismHandbook' && needs.build.outputs.content_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ea-handbook-ebook
          path: dist/

      - name: Generate release tag
        id: tag
        run: echo "tag=handbook-$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "EA Handbook — ${{ steps.tag.outputs.tag }}"
          body: |
            Automated build of the [EA Handbook](https://forum.effectivealtruism.org/handbook).

            **Files:**
            - `ea-handbook.md` — combined Markdown source
            - `ea-handbook.epub` — EPUB 3 ebook
            - `ea-handbook.pdf` — PDF document
          files: |
            dist/ea-handbook.md
            dist/ea-handbook.epub
            dist/ea-handbook.pdf
          token: ${{ secrets.GITHUB_TOKEN }}
