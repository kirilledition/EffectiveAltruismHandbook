name: Build and Release EA Handbook

on:
  schedule:
    # Rebuild weekly on Sundays at 00:00 UTC so the ebook stays up-to-date
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest


  scrape:
    name: Scrape and check for changes
    runs-on: ubuntu-latest
    needs: test
    outputs:
      content_changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Scrape handbook (markdown only)
        run: |
          uv run python -m eahandbookcompiler scrape --output-dir dist --verbose \
            --repo-url "https://github.com/${{ github.repository }}"

      - name: Compute content hash
        id: hash
        run: echo "sha256=$(sha256sum dist/eahandbookcompiler.md | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Restore previous content hash
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: .content-hash
          key: eahandbookcompiler-content-hash
          restore-keys: eahandbookcompiler-content-hash

      - name: Check for content changes
        id: diff
        run: |
          if [ -f .content-hash ] && [ "$(cat .content-hash)" = "${{ steps.hash.outputs.sha256 }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Save new content hash
        if: steps.diff.outputs.changed == 'true'
        run: echo "${{ steps.hash.outputs.sha256 }}" > .content-hash

      - name: Update content hash cache
        if: steps.diff.outputs.changed == 'true'
        uses: actions/cache/save@v5
        with:
          path: .content-hash
          key: eahandbookcompiler-content-hash-${{ steps.hash.outputs.sha256 }}

      - name: Upload markdown artifact
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: eahandbookcompiler-markdown
          path: dist/eahandbookcompiler.md
          retention-days: 1

  build:
    name: Build ebook
    runs-on: ubuntu-latest
    needs: scrape
    if: needs.scrape.outputs.content_changed == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Install pandoc, weasyprint, and Liberation Sans font
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends pandoc weasyprint fonts-liberation

      - name: Download markdown artifact
        uses: actions/download-artifact@v8
        with:
          name: eahandbookcompiler-markdown
          path: dist/

      - name: Convert to epub and pdf
        run: uv run python -m eahandbookcompiler convert dist/eahandbookcompiler.md --output-dir dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: eahandbookcompiler-ebook
          path: dist/
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    # Only create a release on the default branch (not for PRs or forks)
    if: github.ref == 'refs/heads/main' && github.repository == 'kirilledition/EffectiveAltruismHandbook'
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: eahandbookcompiler-ebook
          path: dist/

      - name: Build Python wheel
        run: uv build --wheel --out-dir dist/

      - name: Generate release date and rename files
        id: meta
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          mv dist/eahandbookcompiler.epub "dist/EA Handbook — ${DATE}.epub"
          mv dist/eahandbookcompiler.pdf "dist/EA Handbook — ${DATE}.pdf"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.date }}
          name: "EA Handbook - ${{ steps.meta.outputs.date }}"
          body: |
            Automated build of the [EA Handbook](https://forum.effectivealtruism.org/handbook).

            **Files:**
            - `EA Handbook — ${{ steps.meta.outputs.date }}.epub` — EPUB 3 ebook
            - `EA Handbook — ${{ steps.meta.outputs.date }}.pdf` — PDF document
            - `eahandbookcompiler-*.whl` — Python wheel (install with `uv pip install`)
          files: |
            dist/EA Handbook — ${{ steps.meta.outputs.date }}.epub
            dist/EA Handbook — ${{ steps.meta.outputs.date }}.pdf
            dist/*.whl
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: true
