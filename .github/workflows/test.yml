name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Pytest with Coverage
        run: uv run pytest --cov=eahandbookcompiler --cov-report=xml --cov-report=term

      - name: Extract Coverage Percentage
        if: github.ref == 'refs/heads/main'
        id: coverage
        run: |
          COVERAGE=$(python -c "
          import xml.etree.ElementTree as ET, sys, pathlib
          path = pathlib.Path('coverage.xml')
          if not path.exists():
              print('0', end='')
              sys.exit()
          tree = ET.parse(path)
          rate = float(tree.getroot().attrib.get('line-rate', '0'))
          print(f'{rate * 100:.1f}', end='')
          ")
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"

      - name: Update Coverage Badge
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: coverage.json
          label: coverage
          message: "${{ steps.coverage.outputs.percentage }}%"
          valColorRange: ${{ steps.coverage.outputs.percentage }}
          minColorRange: 50
          maxColorRange: 90

  build-check:
    name: Verify ebook generation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Install pandoc, weasyprint, and Liberation Sans font
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends pandoc weasyprint fonts-liberation

      - name: Generate sample markdown
        run: |
          mkdir -p dist
          cat > dist/sample.md << 'EOF'
          ---
          title: Test Book
          author: Test Author
          language: en
          ---

          # Chapter One

          Hello, world.

          ## Section A

          Some content here with enough text to produce a reasonable file.
          EOF

      - name: Convert to EPUB and PDF
        run: uv run python -m eahandbookcompiler convert dist/sample.md --output-dir dist

      - name: Verify output file sizes
        # The 'convert' CLI command outputs to the markdown file's stem (sample.{epub,pdf})
        run: |
          for ext in epub pdf; do
            file="dist/sample.${ext}"
            if [ ! -f "$file" ]; then
              echo "ERROR: $file was not generated"
              exit 1
            fi
            size=$(stat --format=%s "$file")
            echo "$file: ${size} bytes"
            if [ "$size" -lt 1000 ]; then
              echo "ERROR: $file is suspiciously small (${size} bytes)"
              exit 1
            fi
          done
          echo "All ebook files generated successfully with reasonable sizes."
