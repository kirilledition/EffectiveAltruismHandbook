name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Pytest with Coverage
        run: uv run pytest --cov=eahandbookcompiler --cov-report=xml --cov-report=term

      - name: Generate Coverage Badge
        if: always()
        run: uv run genbadge coverage -i coverage.xml

      - name: Commit Coverage Badge
        uses: stefanzweifel/git-auto-commit-action@v7
        if: always()
        with:
          commit_message: "chore: update coverage badge"
          file_pattern: "coverage.xml coverage-badge.svg"
