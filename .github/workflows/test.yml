name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Pytest with Coverage
        run: uv run pytest -m "not integration" --cov=eahandbookcompiler --cov-report=xml --cov-report=term

      - name: Extract Coverage Percentage
        if: github.ref == 'refs/heads/main'
        id: coverage
        run: |
          COVERAGE=$(python -c "
          import xml.etree.ElementTree as ET, sys, pathlib
          path = pathlib.Path('coverage.xml')
          if not path.exists():
              print('0', end='')
              sys.exit()
          tree = ET.parse(path)
          rate = float(tree.getroot().attrib.get('line-rate', '0'))
          print(f'{rate * 100:.1f}', end='')
          ")
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"

      - name: Update Coverage Badge
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: coverage.json
          label: coverage
          message: "${{ steps.coverage.outputs.percentage }}%"
          valColorRange: ${{ steps.coverage.outputs.percentage }}
          minColorRange: 50
          maxColorRange: 90

  build-check:
    name: Verify ebook generation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Install pandoc, weasyprint, and Liberation Sans font
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends pandoc weasyprint fonts-liberation

      - name: Run ebook generation tests
        run: uv run pytest -m integration -v
