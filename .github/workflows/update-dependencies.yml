name: Update Dependencies

on:
  workflow_dispatch:

jobs:
  update-uv-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Update uv lockfile
        run: uv lock --upgrade

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update all python dependencies"
          title: "chore(deps): update all python dependencies via uv"
          body: |
            This PR updates all Python dependencies to their latest compatible versions using `uv lock --upgrade`.
            
            This was manually triggered via the **Update Dependencies** workflow dispatch.
          branch: "chore/update-uv-dependencies"
          delete-branch: true
