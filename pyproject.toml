[project]
name = "ea-handbook"
version = "2025.2.19"
description = "EA Handbook parser to ebook"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "requests>=2.32.5",
    "beautifulsoup4>=4.14.3",
    "markdownify>=1.2.2",
    "click>=8.3.1",
    "lxml>=6.0.2",
]

[project.scripts]
ea-handbook = "ea_handbook.main:cli"

[build-system]
requires = ["uv-build>=0.10"]
build-backend = "uv_build"


[dependency-groups]
dev = [
    "pytest>=9.0.2",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
