[project]
name = "ea-handbook"
version = "0.1.0"
description = "EA Handbook parser to ebook"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "requests>=2.32",
    "beautifulsoup4>=4.12",
    "markdownify>=0.14",
    "click>=8.1",
    "lxml>=5.3",
]

[project.scripts]
ea-handbook = "ea_handbook.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ea_handbook"]

[dependency-groups]
dev = [
    "black>=26.1.0",
    "coverage-badge>=1.1.2",
    "defusedxml>=0.7.1",
    "genbadge[coverage]>=1.1.3",
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
    "ruff>=0.15.4",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
